server:
  port: 8083

spring:
  datasource:
    url: ${REGISTRATION_DB_URL:jdbc:postgresql://localhost:5432/registration_db}
    username: ${REGISTRATION_DB_USERNAME:postgres}
    password: ${REGISTRATION_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
